name: Publish

# Publishes the crate to crates.io when a version tag (e.g. v0.1.0) is pushed.
# The registry token is NEVER stored in the repo: it lives in the repository
# secret CARGO_REGISTRY_TOKEN and is only referenced here.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify before publishing
        run: make verify

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
